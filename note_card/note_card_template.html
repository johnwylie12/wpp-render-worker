<!doctype html><html><head><meta charset="utf-8"><style>
  @font-face{font-family:'Poppins';src:url(data:font/ttf;base64,{{ pop_r_b64 }}) format('truetype');font-weight:400;}
  @font-face{font-family:'Poppins';src:url(data:font/ttf;base64,{{ pop_sb_b64 }}) format('truetype');font-weight:600;}
  @font-face{font-family:'Poppins';src:url(data:font/ttf;base64,{{ pop_b_b64 }}) format('truetype');font-weight:700;}
  :root{--blue:#1C5DA8;--navy:#003A70;--grey:#7C8A99;}
  *{box-sizing:border-box;}
  @page{size:5in 7in;margin:0;}
  body{margin:0;font-family:'Poppins',sans-serif;}
  .sheet{width:5in;height:7in;padding:0.5in 0.6in;position:relative;}
  .logo{display:block;margin:0 auto 0.3in;height:42px;width:auto;}
  .greeting{color:var(--blue);font-size:13pt;margin:0 0 11px;}
  .body p{color:var(--blue);font-size:11.5pt;line-height:1.36;margin:0 0 9px;font-weight:400;}
  /* Clear paragraph break above the closing so "Warm regards," never collides
     with the last body line. */
  .regards{color:var(--blue);font-size:11.5pt;margin:0.2in 0 0;}
  .sig{margin-top:0.22in;}
  .sig .nm{color:var(--navy);font-weight:700;font-size:12.5pt;}
  .sig .role{color:var(--navy);font-size:10.5pt;margin-top:2px;}
  .sig .contact{color:var(--grey);font-size:10pt;margin-top:3px;}
  .foot{position:absolute;left:0;right:0;bottom:0.34in;text-align:center;}
  .foot img{height:19px;width:auto;}
</style></head><body>
  <div class="sheet">
    <img class="logo" src="{{ logo_uri }}"/>
    <div class="greeting">Dear {{ first }},</div>
    <div class="body">{% for p in body %}<p>{{ p }}</p>{% endfor %}</div>
    <div class="regards">Warm regards,</div>
    <div class="sig">
      <div class="nm">{{ signoff.name }}</div>
      {% if signoff.role %}<div class="role">{{ signoff.role }}</div>{% endif %}
      {% if signoff.contact %}<div class="contact">{{ signoff.contact }}</div>{% endif %}
    </div>
    <div class="foot"><img src="{{ vti_uri }}"/></div>
  </div>
</body></html>
