<!doctype html><html><head><meta charset="utf-8"><style>
  @font-face{font-family:'Trebuchet MS';src:url(data:font/ttf;base64,{{ tre_r_b64 }}) format('truetype');font-weight:400;}
  @font-face{font-family:'Trebuchet MS';src:url(data:font/ttf;base64,{{ tre_b_b64 }}) format('truetype');font-weight:700;}
  :root{--blue:#023976;--navy:#023976;--grey:#7C8A99;}
  *{box-sizing:border-box;}
  @page{size:5in 7in;margin:0;}
  body{margin:0;font-family:'Trebuchet MS','Arial Nova',Arial,sans-serif;}
  .sheet{width:5in;height:7in;padding:0.5in 0.66in;position:relative;}
  .logo{display:block;margin:0 auto 0.34in;height:50px;width:auto;}
  .greeting{color:var(--blue);font-size:15.5pt;margin:0 0 14px;}
  .body p{color:var(--blue);font-size:14pt;line-height:1.4;margin:0 0 13px;font-weight:400;}
  .regards{color:var(--blue);font-size:14pt;margin:0.24in 0 0;}
  .sig{margin-top:0.55in;}
  .sig .nm{color:var(--navy);font-weight:700;font-size:15pt;}
  .sig .role{color:var(--navy);font-size:11.5pt;margin-top:3px;}
  .sig .contact{color:var(--grey);font-size:11pt;margin-top:3px;}
  .foot{position:absolute;left:0;right:0;bottom:0.38in;text-align:center;}
  .foot img{height:22px;width:auto;}
</style></head><body>
  <div class="sheet">
    <img class="logo" src="{{ logo_uri }}"/>
    <div class="greeting">Dear {{ first }},</div>
    <div class="body">{% for p in body %}<p>{{ p }}</p>{% endfor %}</div>
    <div class="regards">Best regards,</div>
    <div class="sig">
      <div class="nm">{{ signoff.name }}</div>
      {% if signoff.role %}<div class="role">{{ signoff.role }}</div>{% endif %}
      {% if signoff.contact %}<div class="contact">{{ signoff.contact }}</div>{% endif %}
    </div>
    <div class="foot"><img src="{{ vti_uri }}"/></div>
  </div>
</body></html>
