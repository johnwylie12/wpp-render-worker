<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <dir>/usr/share/fonts</dir>
  <dir>/usr/share/fonts/brand</dir>
  <cachedir>/tmp/fontconfig</cachedir>
  <!-- Arial Nova / Arial fall back to real Trebuchet (installed brand font). -->
  <match target="pattern"><test name="family"><string>Arial Nova</string></test><edit name="family" mode="assign" binding="strong"><string>Trebuchet MS</string></edit></match>
  <match target="pattern"><test name="family"><string>Arial</string></test><edit name="family" mode="assign" binding="strong"><string>Trebuchet MS</string></edit></match>
  <!-- Trebuchet MS and Paralucent resolve to the installed brand fonts; no Liberation alias. -->
</fontconfig>
